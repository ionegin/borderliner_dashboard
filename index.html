async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function checkAuth(){
  const h=await sha256(document.getElementById('auth-input').value);
  if(h===PWD_HASH){

function parseGviz(raw){const m=raw.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);if(!m)return null;try{return JSON.parse(m[1]);}catch{return null;}}
function gvizDateToISO(v){
  if(!v)return null;
  if(typeof v==='string'){const m=v.match(/Date\((\d+),(\d+),(\d+)/);if(m)return new Date(+m[1],+m[2],+m[3]).toISOString().slice(0,10);return v.slice(0,10);}
  if(v instanceof Date)return v.toISOString().slice(0,10);
  if(typeof v==='number'&&v>40000)return new Date((v-25569)*86400000).toISOString().slice(0,10);
  return String(v).slice(0,10);
}
function sheetsToRows(parsed){
  if(!parsed?.table)return null;
  const cols=parsed.table.cols.map(c=>c.label||c.id);
  return(parsed.table.rows||[]).map(row=>{
    const obj={};
    cols.forEach((col,i)=>{
      if(col.startsWith('#'))return;
      const mapped=COL_MAP[col]||col;
      obj[mapped]=normalizeVal(row.c?.[i]?.v??null);
    });
    return obj;
  });
}
function aggregateByDay(rows){
  const byDate={};
  rows.forEach(row=>{
    let d=row.date||row.Date||row.created_at;if(!d)return;
    d=gvizDateToISO(d);if(!d)return;
    if(!byDate[d])byDate[d]=[];byDate[d].push(row);
  });
  return Object.keys(byDate).sort().map(date=>{
    const g=byDate[date];const agg={date,_messages:g.length};
    const keys=new Set(g.flatMap(r=>Object.keys(r)));
    keys.forEach(col=>{
      if(['date','Date','created_at'].includes(col))return;
      const rule=FIELD_AGG[col]||'mean';
      const vals=g.map(r=>r[col]).filter(v=>v!=null&&v!=='');
      if(!vals.length){agg[col]=null;return;}
      if(rule==='mean'){const n=vals.map(Number).filter(x=>!isNaN(x));agg[col]=n.length?n.reduce((a,b)=>a+b)/n.length:null;}
      else if(rule==='sum'){agg[col]=vals.map(Number).filter(x=>!isNaN(x)).reduce((a,b)=>a+b,0);}
      else if(rule==='max'){agg[col]=vals.map(Number).filter(x=>!isNaN(x)).reduce((a,b)=>Math.max(a,b),0);}
      else if(rule==='first'){agg[col]=vals[0];}
      else if(rule==='notes'){agg[col]=vals.filter(Boolean).join(' | ');}
    });
    if(!agg.sleep_hours&&agg.sleep_time&&agg.wake_time){
      try{const[sh,sm]=String(agg.sleep_time).split(':').map(Number);const[wh,wm]=String(agg.wake_time).split(':').map(Number);let mins=(wh*60+wm)-(sh*60+sm);if(mins<0)mins+=1440;agg.sleep_hours=+(mins/60).toFixed(1);}catch{}
    }
    return agg;
  });
}
function buildAllNotes(mainAgg,notesRows){
  const byDate={};
  mainAgg.forEach(row=>{
    row._ai=row.ai_score??null;
    if(row.mood_note){if(!byDate[row.date])byDate[row.date]=[];byDate[row.date].push(row.mood_note);}
  });
  if(notesRows){
    notesRows.forEach(r=>{
      let d=r.created_at||r.date;if(!d)return;
      d=gvizDateToISO(d);if(!d)return;
      if(r.note){if(!byDate[d])byDate[d]=[];byDate[d].push(r.note);}
      const row=mainAgg.find(x=>x.date===d);
      if(row&&r.ai_score!=null){
        const scores=[row._ai,+r.ai_score].filter(x=>x!=null);
        row._ai=scores.length?scores.reduce((a,b)=>a+b)/scores.length:null;
      }
    });
  }
  ALL_NOTES=Object.entries(byDate).map(([date,texts])=>({date,text:texts.join(' · ')}));
}

function getD(){let d=DATA;if(dateFrom)d=d.filter(r=>r.date>=dateFrom);if(dateTo)d=d.filter(r=>r.date<=dateTo);if(rangeN<999&&!dateFrom&&!dateTo)d=d.slice(-rangeN);return d;}
function ma(arr){return arr.map((v,i)=>{const s=arr.slice(Math.max(0,i-1),i+2).filter(x=>x!=null);return s.length?s.reduce((a,b)=>a+b)/s.length:null;});}
function sleepVal(h){if(h==null)return null;return Math.max(0,(h-4)/8*6+2);}
function smokedVal(n){if(n==null)return null;if(n===0)return 0;return Math.min(n,8);}
function meditateVal(m){return m!=null?Math.min(m,100)/10:null;}
function workVal(h){return h!=null?Math.min(h,10):null;}

function computeYMax(data){
  const vals=[];
  data.forEach(r=>{
    ['anxiety','energy','irritability','racing_thoughts'].forEach(f=>{if(r[f]!=null)vals.push(r[f]);});
    if(vis.ai&&r._ai!=null)vals.push(r._ai);
    if(vis.sleep&&r.sleep_hours!=null)vals.push(sleepVal(r.sleep_hours));
    if(vis.smoked_line&&r.smoked!=null)vals.push(smokedVal(r.smoked));
  });
  if(!vals.length)return 10;
  return Math.ceil(Math.max(...vals))+0.5;
}
function computeYMin(data){
  if(!vis.smoked_line&&!vis.yoga_b&&!vis.modafinil_b)return 1.5;
  if(vis.smoked_line&&data.some(r=>(r.smoked??0)>0))return -0.5;
  if((vis.yoga_b&&data.some(r=>r.yoga))||(vis.modafinil_b&&data.some(r=>r.modafinil)))return -0.5;
  return 1.5;
}

function buildC1ds(data){
  const ds=[];
  if(overlayOn){
    const OV_BASE=2,OV_TOP=computeYMax(data)-0.5,OV_H=Math.max(1,OV_TOP-OV_BASE);
    [[data.map(r=>r.meditate_minutes!=null?OV_BASE+Math.min(r.meditate_minutes,100)/100*OV_H:null),'rgba(83,58,183,.1)'],
     [data.map(r=>r.productivity_hours!=null?OV_BASE+Math.min(r.productivity_hours,10)/10*OV_H:null),'rgba(59,109,17,.1)'],
     [data.map(r=>r._messages!=null?OV_BASE+Math.min(r._messages,12)/12*OV_H:null),'rgba(153,53,86,.1)'],
    ].forEach(([d,c])=>ds.push({type:'bar',label:'',data:d,backgroundColor:c,borderWidth:0,barPercentage:.95,base:OV_BASE,yAxisID:'y',order:20}));
  }
  const push=(label,d,color,opts={})=>ds.push({label,data:d,borderColor:color,backgroundColor:'transparent',tension:opts.t||0.35,pointRadius:opts.pr??2,pointHoverRadius:5,borderWidth:opts.lw||2,borderDash:opts.dash,fill:false,pointStyle:opts.ps||'circle',yAxisID:'y',order:1,spanGaps:true});
  if(vis.anxiety)push('Тревога',ma(data.map(r=>r.anxiety)),'#e24b4a',{t:.4});
  if(vis.energy)push('Энергия',ma(data.map(r=>r.energy)),'#1d9e75',{t:.4});
  if(vis.irritability)push('Раздражит.',ma(data.map(r=>r.irritability)),'#378add',{t:.4});
  if(vis.racing)push('Мысли',ma(data.map(r=>r.racing_thoughts)),'#d4537e',{t:.4});
  if(vis.ai)push('AI',data.map(r=>r._ai??null),'#ba7517',{t:.3,dash:[5,3],ps:'triangle',pr:3});
  if(vis.sleep)push('Сон',data.map(r=>sleepVal(r.sleep_hours)),'#185fa5',{t:0,lw:1.5,pr:2});
  if(vis.smoked_line)ds.push({label:'Косяков',data:data.map(r=>smokedVal(r.smoked)),borderColor:'#3b6d11',backgroundColor:'rgba(59,109,17,.08)',tension:0.35,pointRadius:2,pointHoverRadius:5,borderWidth:1.5,fill:false,yAxisID:'y',order:2,spanGaps:true});
  if(vis.yoga_b)ds.push({label:'Йога',data:data.map(r=>r.yoga?2.2:1.8),borderColor:'#7f77dd',tension:0.3,pointRadius:2,borderWidth:1.5,fill:false,yAxisID:'y',order:2,spanGaps:true});
  if(vis.modafinil_b)ds.push({label:'Модафинил',data:data.map(r=>r.modafinil?2.2:1.8),borderColor:'#d85a30',tension:0.3,pointRadius:2,borderWidth:1.5,fill:false,yAxisID:'y',order:2,spanGaps:true});
  return ds;
}
function buildC2ds(data){
  const ds=[];
  const bar=(label,vals,color)=>ds.push({type:'bar',label,data:vals,backgroundColor:color,borderWidth:1,borderRadius:3,barPercentage:.55});
  if(vis.meditate)bar('Медитация',data.map(r=>meditateVal(r.meditate_minutes)),'rgba(83,58,183,.5)');
  if(vis.work)bar('Работа',data.map(r=>workVal(r.productivity_hours)),'rgba(59,109,17,.5)');
  if(vis.messages)bar('Сообщения',data.map(r=>r._messages??null),'rgba(153,53,86,.5)');
  return ds;
}

function updateAxes(){
  if(!c1)return;
  const data=getD();
  c1.options.scales.y.min=computeYMin(data);
  c1.options.scales.y.max=computeYMax(data);
  c1.options.scales.ySleep.display=!!vis.sleep;
}

function rebuild(){
  const data=getD();
  updateAxes();
  c1.data.labels=data.map(d=>d.date.slice(5));
  c1.data.datasets=buildC1ds(data);
  c1.update();
  c2.data.labels=data.map(d=>d.date.slice(5));
  c2.data.datasets=buildC2ds(data);
  c2.update();
  buildNoteDots(data);
}

function buildNoteDots(data){
  const wrap=document.getElementById('note-dots');wrap.innerHTML='';
  if(!data.length)return;
  ALL_NOTES.filter(n=>data.some(d=>d.date===n.date)).forEach(n=>{
    const idx=data.findIndex(d=>d.date===n.date);if(idx<0)return;
    const pct=((idx+.5)/data.length)*100;
    const dot=document.createElement('div');dot.className='n-dot';dot.style.left=pct+'%';
    const pop=document.createElement('div');pop.className='n-dot-pop';
    pop.style.left=pct+'%';
    pop.style.transform=pct>75?'translateX(-90%)':pct<15?'translateX(-10%)':'translateX(-50%)';
    pop.textContent=n.text;
    dot.addEventListener('mouseenter',()=>pop.style.display='block');
    dot.addEventListener('mouseleave',()=>pop.style.display='none');
    wrap.appendChild(dot);wrap.appendChild(pop);
  });
}

function tog(k){vis[k]=!vis[k];const b=document.getElementById('btn-'+k);if(b){b.classList.toggle('active',vis[k]);b.classList.toggle('inactive',!vis[k]);}rebuild();}
function togOv(){overlayOn=!overlayOn;document.getElementById('btn-ov').classList.toggle('on',overlayOn);rebuild();}
function setRange(n,el){rangeN=n;dateFrom=null;dateTo=null;document.getElementById('df').value='';document.getElementById('dt').value='';document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');rebuild();}
function setCustomRange(){dateFrom=document.getElementById('df').value||null;dateTo=document.getElementById('dt').value||null;rangeN=999;document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));rebuild();}
function setStatus(cls,txt){document.getElementById('sdot').className=cls;document.getElementById('stxt').textContent=txt;}

async function refreshData(){
  const btn=document.getElementById('refresh-btn');btn.textContent='⏳ Загружаю...';btn.classList.add('loading');
  setStatus('spin','Загружаю...');
  try{
    const r1=await fetch(SHEETS.main);
    const p1=parseGviz(await r1.text());
    const rows=sheetsToRows(p1);
    if(rows?.length){
      const agg=aggregateByDay(rows);
      let notesRows=null;
      try{const r2=await fetch(SHEETS.notes);const p2=parseGviz(await r2.text());notesRows=sheetsToRows(p2);}catch{}
      buildAllNotes(agg,notesRows);
      DATA=agg;
      setStatus('ok',`Обновлено · ${DATA[DATA.length-1]?.date||'—'}`);
    }else{
      setStatus('err','Sheets недоступен — статика');
    }
  }catch{setStatus('err','Ошибка сети — статика');}
  rebuild();btn.textContent='↻ Обновить';btn.classList.remove('loading');
}

let zoomStart=null,zoomEnd=null,isDragging=false;
function initZoom(){
  const cv=document.getElementById('c1'),sel=document.getElementById('zoom-sel');
  cv.addEventListener('mousedown',e=>{if(e.button!==0)return;const r=cv.getBoundingClientRect();zoomStart=(e.clientX-r.left)/r.width;isDragging=true;sel.style.display='block';sel.style.left=(zoomStart*100)+'%';sel.style.width='0';});
  cv.addEventListener('mousemove',e=>{if(!isDragging)return;const r=cv.getBoundingClientRect();zoomEnd=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));const l=Math.min(zoomStart,zoomEnd),w=Math.abs(zoomEnd-zoomStart);sel.style.left=(l*100)+'%';sel.style.width=(w*100)+'%';});
  cv.addEventListener('mouseup',e=>{if(!isDragging)return;isDragging=false;const r=cv.getBoundingClientRect();zoomEnd=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));sel.style.display='none';if(Math.abs(zoomEnd-zoomStart)<0.02)return;const data=getD(),n=data.length;const iS=Math.max(0,Math.floor(Math.min(zoomStart,zoomEnd)*n)),iE=Math.min(n-1,Math.ceil(Math.max(zoomStart,zoomEnd)*n));if(iE<=iS)return;dateFrom=data[iS].date;dateTo=data[iE].date;document.getElementById('df').value=dateFrom;document.getElementById('dt').value=dateTo;document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));document.getElementById('zoom-reset').style.display='inline-block';rebuild();});
  cv.addEventListener('mouseleave',()=>{if(isDragging){isDragging=false;sel.style.display='none';}});
}
function resetZoom(){dateFrom=null;dateTo=null;rangeN=999;document.getElementById('df').value='';document.getElementById('dt').value='';document.getElementById('zoom-reset').style.display='none';document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.range-btn:last-of-type')?.classList.add('active');rebuild();}

const crosshairPlugin={id:'crosshair',afterDraw(chart){
  if(chart._chX==null)return;
  const{ctx,chartArea}=chart;
  ctx.save();ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(44,44,42,.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(chart._chX,chartArea.top);ctx.lineTo(chart._chX,chartArea.bottom);ctx.stroke();
  if(chart._chY!=null){ctx.beginPath();ctx.moveTo(chartArea.left,chart._chY);ctx.lineTo(chartArea.right,chart._chY);ctx.stroke();}
  ctx.restore();
}};
function attachCrosshair(cv,chart){
  cv.addEventListener('mousemove',e=>{
    const rect=cv.getBoundingClientRect(),x=e.clientX-rect.left,y=e.clientY-rect.top;
    const ca=chart.chartArea;
    if(!ca||x<ca.left||x>ca.right||y<ca.top||y>ca.bottom){chart._chX=null;chart._chY=null;chart.draw();document.getElementById('tt').style.display='none';return;}
    chart._chX=x;chart._chY=y;
    const data=getD(),idx=Math.round((x-ca.left)/(ca.right-ca.left)*(data.length-1));
    const tt=document.getElementById('tt');
    if(idx>=0&&idx<data.length){
      let nearest=null,minDist=Infinity;
      chart.data.datasets.forEach(ds=>{
        if(!ds.label||ds.type==='bar')return;
        const v=ds.data[idx];if(v==null)return;
        const dist=Math.abs(chart.scales.y.getPixelForValue(v)-y);
        if(dist<minDist){minDist=dist;nearest={label:ds.label,value:v,color:ds.borderColor};}
      });
      let html=`<span style="color:#888780;font-size:10px">${data[idx].date}</span>`;
      if(nearest&&minDist<50)html+=`&nbsp;&nbsp;<span style="color:${nearest.color};font-weight:500">${nearest.label} ${nearest.value.toFixed(1)}</span>`;
      tt.innerHTML=html;tt.style.display='block';
      tt.style.left=Math.min(e.clientX+14,window.innerWidth-200)+'px';
      tt.style.top=(e.clientY-36)+'px';
    }
    chart.draw();
  });
  cv.addEventListener('mouseleave',()=>{chart._chX=null;chart._chY=null;chart.draw();document.getElementById('tt').style.display='none';});
}

function init(){
  const gc='rgba(44,44,42,.07)',tc='#b4b2a9';
  const baseOpts={responsive:true,maintainAspectRatio:true,animation:false,resizeDelay:0,interaction:{mode:'nearest',intersect:false,axis:'x'},plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{ticks:{color:tc,font:{size:9},maxRotation:45},grid:{color:gc}},y:{ticks:{color:tc,font:{size:9}},grid:{color:gc}}}};
  const d0=getD();
  c1=new Chart(document.getElementById('c1'),{
    type:'line',data:{labels:[],datasets:[]},
    options:{...baseOpts,clip:false,scales:{
      ...baseOpts.scales,
      y:{...baseOpts.scales.y,min:computeYMin(d0),max:computeYMax(d0),ticks:{...baseOpts.scales.y.ticks,stepSize:1,callback:v=>Number.isInteger(v)?v:''}},
      ySleep:{position:'right',display:false,min:1.5,max:10,grid:{display:false},ticks:{color:'rgba(24,95,165,.5)',font:{size:8},callback:v=>{const r=Math.round((v-2)/6*8+4);if(r<4||r>12)return'';return r+'ч';}}},
    }},
    plugins:[crosshairPlugin]
  });
  c2=new Chart(document.getElementById('c2'),{type:'bar',data:{labels:[],datasets:[]},options:{...baseOpts,scales:{...baseOpts.scales,y:{...baseOpts.scales.y,min:0}}}});

  const strip=document.getElementById('c1-btn-strip'),ctrlDiv=document.getElementById('c1-controls');
  if(strip&&ctrlDiv){strip.appendChild(ctrlDiv);ctrlDiv.style.margin='0';}

  attachCrosshair(document.getElementById('c1'),c1);
  initZoom();
  Object.entries(vis).forEach(([k,v])=>{const b=document.getElementById('btn-'+k);if(b){b.classList.toggle('active',v);b.classList.toggle('inactive',!v);}});
  setStatus('ok',`Статика · ${STATIC[STATIC.length-1].date}`);
  rebuild();
}
</script>
