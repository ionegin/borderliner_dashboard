function parseGviz(raw){const m=raw.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);if(!m)return null;try{return JSON.parse(m[1]);}catch{return null;}}

function sheetsToRows(parsed){
  if(!parsed?.table)return null;
  const cols=parsed.table.cols.map(c=>c.label||c.id);
  return(parsed.table.rows||[]).map(row=>{
    const obj={};
    cols.forEach((col,i)=>{
      if(col.startsWith('#'))return;
      const mapped=COL_MAP[col]||col;
      const cell=row.c?.[i];
      let v=cell?.v??null;
      v=normalizeVal(v);
      obj[mapped]=v;
    });
    return obj;
  });
}

function gvizDateToISO(v){
  if(!v)return null;
  if(typeof v==='string'){
    const m=v.match(/Date\((\d+),(\d+),(\d+)/);
    if(m){const d=new Date(+m[1],+m[2],+m[3]);return d.toISOString().slice(0,10);}
    return v.slice(0,10);
  }
  if(v instanceof Date)return v.toISOString().slice(0,10);
  if(typeof v==='number'&&v>40000){const d=new Date((v-25569)*86400000);return d.toISOString().slice(0,10);}
  return String(v).slice(0,10);
}

function aggregateByDay(rows){
  const byDate={};
  rows.forEach(row=>{
    let d=row.date||row.Date||row.created_at;
    if(!d)return;
    d=gvizDateToISO(d);
    if(!d)return;
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(row);
  });
  return Object.keys(byDate).sort().map(date=>{
    const g=byDate[date];
    const agg={date,_messages:g.length};
    const keys=new Set(g.flatMap(r=>Object.keys(r)));
    keys.forEach(col=>{
      if(['date','Date','created_at'].includes(col))return;
      const rule=FIELD_AGG[col]||'mean';
      const vals=g.map(r=>r[col]).filter(v=>v!=null&&v!=='');
      if(!vals.length){agg[col]=null;return;}
      if(rule==='mean'){const n=vals.map(Number).filter(x=>!isNaN(x));agg[col]=n.length?n.reduce((a,b)=>a+b)/n.length:null;}
      else if(rule==='sum'){agg[col]=vals.map(Number).filter(x=>!isNaN(x)).reduce((a,b)=>a+b,0);}
      else if(rule==='max'){agg[col]=vals.map(Number).filter(x=>!isNaN(x)).reduce((a,b)=>Math.max(a,b),0);}
      else if(rule==='first'){agg[col]=vals[0];}
      else if(rule==='notes'){agg[col]=vals.filter(Boolean).join(' | ');}
    });
    if(!agg.sleep_hours&&agg.sleep_time&&agg.wake_time){
      try{
        const[sh,sm]=String(agg.sleep_time).split(':').map(Number);
        const[wh,wm]=String(agg.wake_time).split(':').map(Number);
        let mins=(wh*60+wm)-(sh*60+sm);
        if(mins<0)mins+=1440;
        agg.sleep_hours=+(mins/60).toFixed(1);
      }catch{}
    }
    return agg;
  });
}

function mergeNotes(mainAgg, notesRows){
  const byDate={};
  notesRows.forEach(r=>{
    let d=r.created_at||r.date;
    if(!d)return;
    d=gvizDateToISO(d);
    if(!d)return;
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(r);
  });

  AI_NOTES=[];

  return mainAgg.map(row=>{
    const nd=byDate[row.date]||[];
    const scores=[];
    if(row.ai_score!=null)scores.push(+row.ai_score);
    nd.forEach(n=>{if(n.ai_score!=null)scores.push(+n.ai_score);});
    row._ai=scores.length?scores.reduce((a,b)=>a+b)/scores.length:null;

    const notes=[];
    if(row.mood_note)notes.push(row.mood_note);
    nd.forEach(n=>{if(n.note)notes.push(n.note);});
    if(notes.length)AI_NOTES.push({date:row.date,text:notes.join(' · ')});

    return row;
  });
}

function getD(){let d=DATA;if(dateFrom)d=d.filter(r=>r.date>=dateFrom);if(dateTo)d=d.filter(r=>r.date<=dateTo);if(rangeN<999&&!dateFrom&&!dateTo)d=d.slice(-rangeN);return d;}
function ma(arr){return arr.map((v,i)=>{const s=arr.slice(Math.max(0,i-1),i+2).filter(x=>x!=null);return s.length?s.reduce((a,b)=>a+b)/s.length:null;});}

function sleepVal(h){if(h==null)return null;return Math.max(0,Math.min(10,(h-4)/8*6+2));}
function smokedVal(n){if(n==null)return null;if(n===0)return 0;return Math.min(n,10);}
function meditateVal(m){return m!=null?Math.min(m,100)/10:null;}
function workVal(h){return h!=null?Math.min(h,10):null;}
function getYMin(){if(!vis.smoked_line&&!vis.yoga_b&&!vis.modafinil_b)return 1.8;const data=getD();if(vis.smoked_line&&data.some(r=>(r.smoked??0)>0))return-0.5;if(vis.yoga_b&&data.some(r=>r.yoga))return-0.5;if(vis.modafinil_b&&data.some(r=>r.modafinil))return-0.5;return 1.8;}
function updateYMin(){if(!c1)return;const nm=getYMin();if(c1.options.scales.y.min!==nm){c1.options.scales.y.min=nm;c1.options.scales.ySleep.min=nm;}c1.options.scales.ySleep.display=!!vis.sleep;c1.update('none');}

function buildC1ds(data){
  const ds=[];
  if(overlayOn){
    const OV_BASE=3,OV_TOP=9,OV_H=OV_TOP-OV_BASE;
    [[data.map(r=>r.meditate_minutes!=null?OV_BASE+Math.min(r.meditate_minutes,100)/100*OV_H:null),'rgba(83,58,183,.12)'],
     [data.map(r=>r.productivity_hours!=null?OV_BASE+Math.min(r.productivity_hours,10)/10*OV_H:null),'rgba(59,109,17,.12)'],
     [data.map(r=>r._messages!=null?OV_BASE+Math.min(r._messages,12)/12*OV_H:null),'rgba(153,53,86,.12)'],
    ].forEach(([d,c])=>ds.push({type:'bar',label:'',data:d,backgroundColor:c,borderWidth:0,barPercentage:.95,base:OV_BASE,yAxisID:'y',order:20}));
  }
  const push=(label,data,color,opts={})=>ds.push({label,data,borderColor:color,backgroundColor:'transparent',tension:opts.t||0.35,pointRadius:opts.pr??2,pointHoverRadius:5,borderWidth:opts.lw||2,borderDash:opts.dash,fill:false,pointStyle:opts.ps||'circle',yAxisID:'y',order:1,spanGaps:true});
  const s=v=>smoothing?ma(v):v;
  if(vis.anxiety)push('Тревога',s(data.map(r=>r.anxiety)),'#e24b4a',{t:.4});
  if(vis.energy)push('Энергия',s(data.map(r=>r.energy)),'#1d9e75',{t:.4});
  if(vis.irritability)push('Раздражит.',s(data.map(r=>r.irritability)),'#378add',{t:.4});
  if(vis.racing)push('Мысли',s(data.map(r=>r.racing_thoughts)),'#d4537e',{t:.4});
  if(vis.ai)push('AI',data.map(r=>r._ai??null),'#ba7517',{t:.3,dash:[5,3],ps:'triangle',pr:3});
  if(vis.sleep)push('Сон',data.map(r=>sleepVal(r.sleep_hours)),'#185fa5',{t:0,lw:1.5,pr:2});
  if(vis.smoked_line)ds.push({label:'Косяков',data:data.map(r=>smokedVal(r.smoked)),borderColor:'#3b6d11',backgroundColor:'rgba(59,109,17,.08)',tension:0.35,pointRadius:2,pointHoverRadius:5,borderWidth:1.5,fill:false,yAxisID:'y',order:2,spanGaps:true});
  if(vis.yoga_b)ds.push({label:'Йога',data:data.map(r=>r.yoga?2.5:2.0),borderColor:'#7f77dd',backgroundColor:'rgba(127,119,221,.08)',tension:0.3,pointRadius:2,pointHoverRadius:5,borderWidth:1.5,fill:false,yAxisID:'y',order:2,spanGaps:true});
  if(vis.modafinil_b)ds.push({label:'Модафинил',data:data.map(r=>r.modafinil?2.5:2.0),borderColor:'#d85a30',backgroundColor:'rgba(216,90,48,.07)',tension:0.3,pointRadius:2,pointHoverRadius:5,borderWidth:1.5,fill:false,yAxisID:'y',order:2,spanGaps:true});
  return ds;
}

function buildC2ds(data){
  const ds=[];
  const bar=(label,vals,color)=>ds.push({type:'bar',label,data:vals,backgroundColor:color,borderColor:color.replace('.5','.8'),borderWidth:1,borderRadius:3,barPercentage:.55});
  if(vis.meditate)bar('Медитация',data.map(r=>meditateVal(r.meditate_minutes)),'rgba(83,58,183,.5)');
  if(vis.work)bar('Работа',data.map(r=>workVal(r.productivity_hours)),'rgba(59,109,17,.5)');
  if(vis.messages)bar('Сообщения',data.map(r=>r._messages??null),'rgba(153,53,86,.5)');
  return ds;
}

function rebuild(){
  const data=getD();const labels=data.map(d=>d.date.slice(5));
  c1.data.labels=labels;c1.data.datasets=buildC1ds(data);c1.update();
  c2.data.labels=labels;c2.data.datasets=buildC2ds(data);c2.update();
  buildNotesBar(data);buildNoteDots(data);
}

function buildNotesBar(data){
  const bar=document.getElementById('notes-bar');bar.innerHTML='';bar.style.display='none';
  if(!data.length)return;
  const notes=AI_NOTES.filter(n=>data.some(d=>d.date===n.date));
  if(!notes.length)return;
  bar.style.display='block';
  notes.forEach(n=>{
    const idx=data.findIndex(d=>d.date===n.date);if(idx<0)return;
    const pct=((idx+.5)/data.length)*100;
    const vl=document.createElement('div');vl.className='n-vline';vl.style.left=pct+'%';
    const pin=document.createElement('div');pin.className='n-pin';pin.style.left=pct+'%';pin.textContent='📝';
    const pop=document.createElement('div');pop.className='n-popup';pop.style.left=pct+'%';pop.textContent=n.text;
    pin.addEventListener('mouseenter',()=>{pop.style.display='block';vl.style.background='rgba(186,117,23,.5)';});
    pin.addEventListener('mouseleave',()=>{pop.style.display='none';vl.style.background='rgba(186,117,23,.25)';});
    bar.appendChild(vl);bar.appendChild(pin);bar.appendChild(pop);
  });
}

function buildNoteDots(data){
  const wrap=document.getElementById('note-dots');wrap.innerHTML='';if(!data.length)return;
  const canvas=document.getElementById('c1');
  data.forEach((d,i)=>{
    if(!d.mood_note)return;
    const pct=(((i+.5)/data.length)*100)+'%';
    const vline=document.createElement('div');
    vline.style.cssText=`position:absolute;left:${pct};top:0;transform:translateX(-50%);width:1px;background:rgba(44,44,42,.12);pointer-events:none;display:none;z-index:3;`;
    vline.style.height=(canvas?canvas.offsetHeight:140)+'px';
    vline.style.marginTop=`-${(canvas?canvas.offsetHeight:140)}px`;
    const dot=document.createElement('div');dot.className='n-dot';dot.style.left=pct;
    const pop=document.createElement('div');pop.className='n-dot-pop';
    const pctNum=(i+.5)/data.length;
    pop.style.left=pct;pop.style.transform=pctNum>0.75?'translateX(-90%)':pctNum<0.15?'translateX(-10%)':'translateX(-50%)';
    pop.textContent=d.mood_note;
    dot.addEventListener('mouseenter',()=>{pop.style.display='block';vline.style.display='block';dot.style.background='rgba(44,44,42,.6)';});
    dot.addEventListener('mouseleave',()=>{pop.style.display='none';vline.style.display='none';dot.style.background='';});
    wrap.appendChild(vline);wrap.appendChild(dot);wrap.appendChild(pop);
  });
}

function tog(k){vis[k]=!vis[k];const b=document.getElementById('btn-'+k);if(b){b.classList.toggle('active',vis[k]);b.classList.toggle('inactive',!vis[k]);}updateYMin();rebuild();}
function togOv(){overlayOn=!overlayOn;document.getElementById('btn-ov').classList.toggle('on',overlayOn);rebuild();}
function toggleSmooth(){smoothing=!smoothing;document.getElementById('btn-smooth').classList.toggle('on',smoothing);rebuild();}
function setRange(n,el){rangeN=n;dateFrom=null;dateTo=null;document.getElementById('df').value='';document.getElementById('dt').value='';document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');rebuild();}
function setCustomRange(){dateFrom=document.getElementById('df').value||null;dateTo=document.getElementById('dt').value||null;rangeN=999;document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));rebuild();}
function setStatus(cls,txt){document.getElementById('sdot').className=cls;document.getElementById('stxt').textContent=txt;}

async function refreshData(){
  const btn=document.getElementById('refresh-btn');btn.textContent='⏳...';
  setStatus('spin','Загружаю...');
  try{
    const r1=await fetch(SHEETS.main);
    const p1=parseGviz(await r1.text());
    const rows=sheetsToRows(p1);
    if(rows?.length){
      let agg=aggregateByDay(rows);
      try{
        const r2=await fetch(SHEETS.notes);
        const p2=parseGviz(await r2.text());
        const notesRows=sheetsToRows(p2);
        if(notesRows?.length)agg=mergeNotes(agg,notesRows);
        else{agg=agg.map(row=>{row._ai=row.ai_score??null;if(row.mood_note)AI_NOTES.push({date:row.date,text:row.mood_note});return row;});}
      }catch{agg=agg.map(row=>{row._ai=row.ai_score??null;return row;});}
      DATA=agg;
      setStatus('ok',`Обновлено · ${DATA[DATA.length-1]?.date||'—'}`);
    }else{setStatus('err','Sheets недоступен — статика');}
  }catch{setStatus('err','Ошибка сети — статика');}
  rebuild();btn.textContent='↻ Обновить';
}

let zoomStart=null,zoomEnd=null,isDragging=false;
function initZoom(){
  const canvas=document.getElementById('c1');const sel=document.getElementById('zoom-sel');
  canvas.addEventListener('mousedown',e=>{if(e.button!==0)return;const rect=canvas.getBoundingClientRect();zoomStart=(e.clientX-rect.left)/rect.width;isDragging=true;sel.style.display='block';sel.style.left=(zoomStart*100)+'%';sel.style.width='0';});
  canvas.addEventListener('mousemove',e=>{if(!isDragging)return;const rect=canvas.getBoundingClientRect();zoomEnd=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));const l=Math.min(zoomStart,zoomEnd);const w=Math.abs(zoomEnd-zoomStart);sel.style.left=(l*100)+'%';sel.style.width=(w*100)+'%';});
  canvas.addEventListener('mouseup',e=>{if(!isDragging)return;isDragging=false;const rect=canvas.getBoundingClientRect();zoomEnd=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));sel.style.display='none';if(Math.abs(zoomEnd-zoomStart)<0.02)return;const data=getD();const n=data.length;const iS=Math.max(0,Math.floor(Math.min(zoomStart,zoomEnd)*n));const iE=Math.min(n-1,Math.ceil(Math.max(zoomStart,zoomEnd)*n));if(iE<=iS)return;dateFrom=data[iS].date;dateTo=data[iE].date;document.getElementById('df').value=dateFrom;document.getElementById('dt').value=dateTo;document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));document.getElementById('zoom-reset').style.display='inline-block';rebuild();});
  canvas.addEventListener('mouseleave',()=>{if(isDragging){isDragging=false;sel.style.display='none';}});
}
function resetZoom(){dateFrom=null;dateTo=null;rangeN=999;document.getElementById('df').value='';document.getElementById('dt').value='';document.getElementById('zoom-reset').style.display='none';document.querySelectorAll('.range-btn').forEach(b=>b.classList.remove('active'));document.querySelector('.range-btn:last-of-type')?.classList.add('active');rebuild();}

const crosshairPlugin={
  id:'crosshair',
  afterDraw(chart){
    if(chart._crosshairX==null)return;
    const{ctx,chartArea,scales}=chart;
    const x=chart._crosshairX;
    const y=chart._crosshairY;
    ctx.save();
    ctx.setLineDash([3,3]);
    ctx.strokeStyle='rgba(44,44,42,.25)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,chartArea.top);ctx.lineTo(x,chartArea.bottom);ctx.stroke();
    if(y!=null){ctx.beginPath();ctx.moveTo(chartArea.left,y);ctx.lineTo(chartArea.right,y);ctx.stroke();}
    ctx.restore();
  }
};

function attachCrosshair(canvas,chart){
  canvas.addEventListener('mousemove',e=>{
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=e.clientY-rect.top;
    const ca=chart.chartArea;
    if(!ca||x<ca.left||x>ca.right||y<ca.top||y>ca.bottom){chart._crosshairX=null;chart._crosshairY=null;chart.draw();return;}
    chart._crosshairX=x;
    chart._crosshairY=y;
    const data=getD();
    const idx=Math.round((x-ca.left)/(ca.right-ca.left)*(data.length-1));
    const tt=document.getElementById('tt');
    if(idx>=0&&idx<data.length){
      const row=data[idx];
      let nearest=null,minDist=Infinity;
      chart.data.datasets.forEach((ds,di)=>{
        if(!ds.label||ds.type==='bar')return;
        const v=ds.data[idx];if(v==null)return;
        const py=chart.scales.y.getPixelForValue(v);
        const dist=Math.abs(py-y);
        if(dist<minDist){minDist=dist;nearest={label:ds.label,value:v,color:ds.borderColor};}
      });
      let html=`<span style="color:#888780;font-size:10px">${row.date}</span>`;
      if(nearest&&minDist<40)html+=`&nbsp;&nbsp;<span style="color:${nearest.color};font-weight:500">${nearest.label}&nbsp;${nearest.value.toFixed(1)}</span>`;
      tt.innerHTML=html;
      tt.style.display='block';
      tt.style.left=Math.min(e.clientX+14,window.innerWidth-200)+'px';
      tt.style.top=(e.clientY-36)+'px';
    }
    chart.draw();
  });
  canvas.addEventListener('mouseleave',()=>{chart._crosshairX=null;chart._crosshairY=null;chart.draw();document.getElementById('tt').style.display='none';});
}

function init(){
  const gridColor='rgba(44,44,42,.07)';
  const tickColor='#b4b2a9';
  const baseOpts={responsive:true,maintainAspectRatio:true,animation:false,resizeDelay:0,interaction:{mode:'nearest',intersect:false,axis:'x'},plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{ticks:{color:tickColor,font:{size:8},maxRotation:45},grid:{color:gridColor}},y:{ticks:{color:tickColor,font:{size:8}},grid:{color:gridColor}}}};

  c1=new Chart(document.getElementById('c1'),{
    type:'line',data:{labels:[],datasets:[]},
    options:{...baseOpts,clip:false,scales:{...baseOpts.scales,
      y:{...baseOpts.scales.y,min:getYMin(),max:10,ticks:{...baseOpts.scales.y.ticks,stepSize:1,callback:v=>{if(v<=1||v>=10)return'';return v;}}},
      ySleep:{position:'right',display:false,min:getYMin(),max:13,grid:{display:false},ticks:{color:'rgba(24,95,165,.5)',font:{size:7},stepSize:1,callback:v=>{const r=v+4;if(r<4||r>13)return'';return r+'ч';}}},
    },
    plugins:{...baseOpts.plugins}},
    plugins:[crosshairPlugin,{id:'darkZone',afterDatasetsDraw(chart){const{ctx,chartArea,scales}=chart;if(!chartArea||!scales.y)return;const y9=scales.y.getPixelForValue(9);if(y9>chartArea.top){ctx.save();ctx.fillStyle='rgba(44,44,42,.04)';ctx.fillRect(chartArea.left,chartArea.top,chartArea.width,y9-chartArea.top);ctx.restore();}}}]
  });

  c2=new Chart(document.getElementById('c2'),{
    type:'bar',data:{labels:[],datasets:[]},
    options:{...baseOpts,scales:{...baseOpts.scales,y:{...baseOpts.scales.y,min:0}}}
  });

  const strip=document.getElementById('c1-btn-strip');
  const ctrlDiv=document.getElementById('c1-controls');
  if(strip&&ctrlDiv){strip.appendChild(ctrlDiv);ctrlDiv.style.margin='0';}

  attachCrosshair(document.getElementById('c1'),c1);

  initZoom();
  Object.entries(vis).forEach(([k,v])=>{const b=document.getElementById('btn-'+k);if(b){b.classList.toggle('active',v);b.classList.toggle('inactive',!v);}});
  setStatus('ok',`Статика · ${STATIC[STATIC.length-1].date}`);
  rebuild();
}

init();
</script>
